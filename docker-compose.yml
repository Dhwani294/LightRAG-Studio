version: "3.9"

services:

  backend:
    build:
      context: .
      dockerfile: deployment/docker/Dockerfile

    container_name: lightrag-backend

    ports:
      - "8000:8000"

    env_file:
      - .env

    volumes:
      - .:/app

    depends_on:
      - qdrant

  qdrant:
    image: qdrant/qdrant:latest

    container_name: lightrag-qdrant

    ports:
      - "6333:6333"

    volumes:
      - ./data/qdrant:/qdrant/storage